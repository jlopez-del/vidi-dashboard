<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Medico index.htmlVIDI</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:1200px;margin:0 auto;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:40px}header{text-align:center;margin-bottom:30px;border-bottom:4px solid #25D366;padding-bottom:20px}header h1{color:#25D366;font-size:2.2em}header p{color:#666}.filter-section{background:#f5f5f5;padding:20px;border-left:5px solid #25D366;border-radius:8px;margin-bottom:25px}.filter-row{display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}.form-group{display:flex;flex-direction:column}.form-group label{font-weight:bold;color:#333;margin-bottom:6px;font-size:.9em}.form-group input{padding:10px;border:2px solid #ddd;border-radius:6px;font-size:.95em}.btn{padding:10px 20px;border:none;border-radius:6px;font-size:.95em;font-weight:bold;cursor:pointer}.btn-primary{background:#25D366;color:white}.btn-secondary{background:#ccc;color:#333}.metrics-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:15px;margin-bottom:25px}.metric-card{padding:20px;border-radius:12px;text-align:center;border-left:5px solid #25D366}.metric-card.total{background:linear-gradient(135deg,#c8e6c9,#a5d6a7)}.metric-card.examenes{background:linear-gradient(135deg,#fff9c4,#fff176)}.metric-card.horamedica{background:linear-gradient(135deg,#ffe0b2,#ffcc80)}.metric-card.coordinacion{background:linear-gradient(135deg,#f8bbd0,#f48fb1)}.metric-card.noacept{background:linear-gradient(135deg,#ffcdd2,#ef9a9a)}.metric-value{font-size:2.8em;font-weight:bold;color:#1a7d40;margin:8px 0}.metric-label{font-size:.9em;color:#333;font-weight:bold}.details-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px;margin-bottom:25px}.detail-card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:18px;border-left:5px solid #25D366}.detail-card h3{color:#25D366;margin-bottom:12px}.detail-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:.9em}.detail-item:last-child{border-bottom:none}.detail-label{color:#666;font-weight:bold}.detail-value{color:#25D366;font-weight:bold}.error-msg{background:#ffebee;color:#c62828;padding:15px;border-radius:8px;margin-bottom:20px;border-left:5px solid #c62828}.loading{text-align:center;padding:30px;color:#666}.spinner{border:4px solid #f3f3f3;border-top:4px solid #25D366;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:15px auto}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.btn-export{background:#25D366;color:white;padding:12px 24px;width:100%;margin-top:10px;font-size:1em}.no-data{text-align:center;padding:40px;color:#e74c3c;font-size:1.1em}</style>
</head>
<body>
<div class="container">
<header><h1>Dashboard Medico VIDI</h1><p>Datos en vivo desde Google Sheets</p></header>
<div class="filter-section"><h2 style="color:#25D366;margin-bottom:15px">Filtrar por Fecha</h2><div class="filter-row"><div class="form-group"><label>Desde</label><input type="date" id="filterFrom" value="2026-01-01"></div><div class="form-group"><label>Hasta</label><input type="date" id="filterTo" value="2026-12-31"></div><button class="btn btn-primary" onclick="filtrar()">Filtrar</button><button class="btn btn-secondary" onclick="limpiar()">Limpiar</button></div></div>
<div id="errorContainer"></div><div id="loadingContainer"></div>
<div class="metrics-container" id="metricsContainer"></div>
<div class="details-container" id="detailsContainer"></div>
<button class="btn btn-export" onclick="exportarPDF()">Exportar a PDF</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
var API='https://script.google.com/macros/s/AKfycbwrVogAnTZR2Moj-gdX_aU-1nZ4mp6PALkt2gQfcz3jFMejh89Z0xY-D9eZ0SKq2CMPjw/exec';
var allData=[];
function cargar(){showLoad();clearErr();fetch(API).then(function(r){return r.json();}).then(function(d){allData=d;mostrar(d);hideLoad();}).catch(function(e){hideLoad();showErr('Error: '+e.message);});}
function mostrar(data){if(!data||!data.length){document.getElementById('metricsContainer').innerHTML='';document.getElementById('detailsContainer').innerHTML='<div class="no-data">Sin datos</div>';return;}var s=calcStats(data);renderMetrics(s);renderDetails(s);}
function calcStats(data){var ex=[],hm=[],co=[],na=[];data.forEach(function(r){var v=r.respuesta?String(r.respuesta).toLowerCase():'';var it={tel:String(r.telefono||''),fecha:String(r.fecha||'')};if(v.indexOf('exam')>=0)ex.push(it);else if(v.indexOf('hora')>=0||v.indexOf('dica')>=0)hm.push(it);else if(v.indexOf('coordinaci')>=0||v.indexOf('cirug')>=0)co.push(it);else if(v.indexOf('no acep')>=0)na.push(it);});return{total:data.length,ex:ex,hm:hm,co:co,na:na};}
function renderMetrics(s){document.getElementById('metricsContainer').innerHTML='<div class="metric-card total"><div class="metric-label">TOTAL</div><div class="metric-value">'+s.total+'</div></div><div class="metric-card examenes"><div class="metric-label">1 Examenes</div><div class="metric-value">'+s.ex.length+'</div></div><div class="metric-card horamedica"><div class="metric-label">2 Hora Medica</div><div class="metric-value">'+s.hm.length+'</div></div><div class="metric-card coordinacion"><div class="metric-label">3 Coordinacion</div><div class="metric-value">'+s.co.length+'</div></div><div class="metric-card noacept"><div class="metric-label">No Acepto</div><div class="metric-value">'+s.na.length+'</div></div>';}
function card(t,items){var u=0,seen={};items.forEach(function(i){if(i.tel&&i.tel!='undefined'&&!seen[i.tel]){seen[i.tel]=1;u++;}});var f1=items.length?items[0].fecha:'N/A',f2=items.length?items[items.length-1].fecha:'N/A';return '<div class="detail-card"><h3>'+t+'</h3><div class="detail-item"><span class="detail-label">Respuestas:</span><span class="detail-value">'+items.length+'</span></div><div class="detail-item"><span class="detail-label">Telefonos unicos:</span><span class="detail-value">'+u+'</span></div><div class="detail-item"><span class="detail-label">Periodo:</span><span class="detail-value">'+f1+' - '+f2+'</span></div></div>';}
function renderDetails(s){document.getElementById('detailsContainer').innerHTML=card('1 Examenes',s.ex)+card('2 Hora Medica',s.hm)+card('3 Coordinacion Cirugia',s.co)+card('No Acepto',s.na);}
function filtrar(){var desde=new Date(document.getElementById('filterFrom').value),hasta=new Date(document.getElementById('filterTo').value);hasta.setHours(23,59,59);var f=allData.filter(function(r){if(!r.fecha)return false;var p=String(r.fecha).split('/');var d=p.length===3?new Date(p[2],p[1]-1,p[0]):new Date(r.fecha);return d>=desde&&d<=hasta;});if(!f.length){document.getElementById('metricsContainer').innerHTML='';document.getElementById('detailsContainer').innerHTML='<div class="no-data">Sin datos en ese rango</div>';return;}var s=calcStats(f);renderMetrics(s);renderDetails(s);}
function limpiar(){document.getElementById('filterFrom').value='2026-01-01';document.getElementById('filterTo').value='2026-12-31';mostrar(allData);}
function exportarPDF(){html2pdf().set({margin:8,filename:'Dashboard_VIDI.pdf',html2canvas:{scale:2},jsPDF:{orientation:'portrait',unit:'mm',format:'a4'}}).from(document.querySelector('.container')).save();}
function showLoad(){document.getElementById('loadingContainer').innerHTML='<div class="loading"><div class="spinner"></div><p>Cargando datos...</p></div>';}
function hideLoad(){document.getElementById('loadingContainer').innerHTML='';}
function showErr(m){document.getElementById('errorContainer').innerHTML='<div class="error-msg">'+m+'</div>';}
function clearErr(){document.getElementById('errorContainer').innerHTML='';}
window.addEventListener('load',cargar);
</script>
</body>
</html>
